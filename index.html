<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大学生AI学习习惯测评</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FAFAF8; --surface: #FFFFFF; --surface2: #F4F3EE;
    --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
    --text-primary: #1A1A18; --text-secondary: #5A5A56; --text-muted: #9A9A94;
    --blue: #378ADD; --blue-light: #E6F1FB; --blue-text: #0C447C;
    --teal: #1D9E75; --purple: #7F77DD; --coral: #D85A30; --amber: #BA7517;
    --red: #E24B4A; --red-text: #A32D2D;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; padding: 3rem 1rem 5rem; }
  .container { max-width: 640px; margin: 0 auto; }

  .lang-bar { display: flex; justify-content: flex-end; margin-bottom: 1.5rem; }
  .lang-toggle { display: flex; gap: 4px; }
  .lang-btn { background: transparent; border: 0.5px solid var(--border-strong); border-radius: 20px; padding: 4px 14px; font-size: 12px; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .lang-btn:hover { background: var(--surface); color: var(--text-primary); }
  .lang-btn.active { background: var(--text-primary); color: var(--bg); border-color: var(--text-primary); }

  .quiz-header { border-bottom: 0.5px solid var(--border); padding-bottom: 1.5rem; margin-bottom: 2rem; }
  .eyebrow { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; }
  .quiz-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 28px; font-weight: 400; line-height: 1.25; margin-bottom: 8px; }
  .quiz-subtitle { font-size: 13.5px; color: var(--text-secondary); line-height: 1.65; }

  .progress-wrap { margin-bottom: 2rem; }
  .progress-bar-bg { height: 2px; background: var(--surface2); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s ease; width: 0%; }
  .progress-label { font-size: 11px; color: var(--text-muted); }

  .dim-section { margin-bottom: 2rem; }
  .dim-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 0.5px solid var(--border); }
  .dim-section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dim-section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); }

  .q-block { margin-bottom: 1rem; padding: 1.25rem 1.4rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; transition: border-color 0.2s; }
  .q-block.answered { border-color: var(--border-strong); }
  .q-num { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .q-text { font-size: 14.5px; line-height: 1.6; margin-bottom: 1rem; }
  .options-grid { display: flex; flex-direction: column; gap: 5px; }
  .opt-btn { text-align: left; padding: 8px 13px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 8px; font-size: 12.5px; color: var(--text-primary); cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; line-height: 1.45; }
  .opt-btn:hover:not(.selected):not(.ineligible-opt) { background: #EEEEE8; border-color: var(--border-strong); }
  .opt-btn.selected { background: var(--blue-light); border-color: #85B7EB; color: var(--blue-text); }

  .ineligible-notice { display: none; margin-top: 10px; padding: 10px 14px; background: #FEF3F2; border: 0.5px solid #FECDC9; border-radius: 8px; font-size: 12.5px; color: #A32D2D; line-height: 1.55; }

  .submit-btn { width: 100%; padding: 14px; background: var(--text-primary); color: var(--bg); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; letter-spacing: 0.02em; margin-top: 1rem; }
  .submit-btn:disabled { opacity: 0.3; cursor: default; }
  .submit-btn:not(:disabled):hover { opacity: 0.82; }
  .saving-indicator { text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 10px; min-height: 18px; }
  .saving-indicator.success { color: var(--teal); }
  .saving-indicator.error { color: var(--red-text); }

  #resultWrap { display: none; }
  .result-type-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .result-title { font-family: 'DM Serif Display', Georgia, serif; font-size: 30px; font-weight: 400; line-height: 1.2; margin-bottom: 12px; }
  .result-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.75; margin-bottom: 1.75rem; }

  .dim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .dim-card { padding: 1rem 1.1rem; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; }
  .dim-label { font-size: 10.5px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
  .dim-bar-bg { height: 3px; background: var(--surface2); border-radius: 2px; margin-bottom: 6px; overflow: hidden; }
  .dim-bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(.4,0,.2,1); }
  .dim-score { font-size: 12px; color: var(--text-secondary); }

  .integrity-callout { padding: 1rem 1.25rem; border-left: 2px solid var(--red); background: var(--surface); border-radius: 0 8px 8px 0; margin-bottom: 1.5rem; border-top: 0.5px solid var(--border); border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); }
  .integrity-callout.low { border-left-color: var(--teal); }
  .integrity-label { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--red-text); margin-bottom: 5px; }
  .integrity-callout.low .integrity-label { color: #0F6E56; }
  .integrity-text { font-size: 13px; color: var(--text-primary); line-height: 1.65; }

  .recs-wrap { margin-top: 1.5rem; }
  .recs-section-title { font-size: 10.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; margin-top: 1.25rem; }
  .recs-section-title:first-child { margin-top: 0; }
  .rec-item { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .rec-item:last-child { border-bottom: none; }
  .rec-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 7px; }
  .rec-dot.short { background: var(--blue); }
  .rec-dot.long { background: var(--purple); }
  .rec-text { font-size: 13.5px; color: var(--text-secondary); line-height: 1.65; }

  .result-divider { height: 0.5px; background: var(--border); margin: 1.5rem 0; }
  .ref-note { margin-top: 2rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); font-size: 11px; color: var(--text-muted); line-height: 1.75; }
  .retake-btn { margin-top: 1.25rem; background: transparent; border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 9px 18px; font-size: 13px; color: var(--text-secondary); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .retake-btn:hover { background: var(--surface); color: var(--text-primary); }
</style>
</head>
<body>
<div class="container">
  <div class="lang-bar">
    <div class="lang-toggle">
      <button class="lang-btn" onclick="setLang('en')">English</button>
      <button class="lang-btn active" onclick="setLang('zh')">中文</button>
    </div>
  </div>

  <div id="quizWrap">
    <div class="quiz-header">
      <p class="eyebrow" id="hEyebrow"></p>
      <h1 class="quiz-title" id="hTitle"></h1>
      <p class="quiz-subtitle" id="hSubtitle"></p>

    <div class="progress-wrap">

    <div id="questionsArea"></div>
    <button class="submit-btn" id="submitBtn" disabled onclick="submitQuiz()"></button>
    <p class="saving-indicator" id="savingIndicator"></p>
  </div>

  <div id="resultWrap">
    <div class="quiz-header">
      <p class="eyebrow" id="resEyebrow"></p>
      <h1 class="result-title" id="resTitle"></h1>
      <p class="result-type-label" id="resTypeLabel"></p>
    </div>
    <p class="result-desc" id="resDesc"></p>
    <div class="dim-grid" id="dimGrid"></div>
    <div class="integrity-callout" id="integrityCallout">
      <p class="integrity-label" id="integrityLabel"></p>
      <p class="integrity-text" id="integrityText"></p>

    <div class="result-divider"></div>

    <p class="ref-note" id="refNote"></p>
    <button class="retake-btn" id="retakeBtn" onclick="retake()"></button>

</div>

// ── logic ─────────────────────────────────────────────────────────────────────
function calcDim(dim) {
  const qs = questions[lang].filter(q => q.dim === dim && !q.type);
  return Math.round(qs.reduce((s, q) => s + (answers[q.id] || 0), 0) / (qs.length * 5) * 100);
}

function getProfileKey(dims) {
  const { PE, EE, HB, HM, IA } = dims;
  const adoption = Math.round((PE + EE + HB + HM) / 4);
  if (IA >= 65) return 'anxious';
  if (adoption >= 70) return 'strategic';
  if (HB <= 40) return 'skeptic';
  return 'explorer';
}

function renderQuestions() {
  const qs = questions[lang];
  const tr = t[lang];
  const area = document.getElementById('questionsArea');
  area.innerHTML = '';
  let currentDim = null;
  let mainQNum = 0;

  qs.forEach(q => {
    if (q.dim !== currentDim) {
      currentDim = q.dim;
      const sec = document.createElement('div');
      sec.className = 'dim-section';
      sec.id = 'sec-' + q.dim;
      const color = dimColors[q.dim] || '#9A9A94';
      sec.innerHTML = `<div class="dim-section-header"><div class="dim-section-dot" style="background:${color}"></div><span class="dim-section-title">${tr.dimSectionLabels[q.dim]}</span></div>`;
      area.appendChild(sec);
    }

    const sec = document.getElementById('sec-' + q.dim);
    const saved = answers[q.id];
    const isDemo = q.type === 'demo';
    if (!isDemo) mainQNum++;

    const div = document.createElement('div');
    div.className = 'q-block' + (saved !== undefined ? ' answered' : '');
    div.id = 'qb-' + q.id;

    const label = isDemo ? `基本信息 ${['d1','d2','d3'].indexOf(String(q.id))+1}` : tr.qOf(mainQNum, 30);

    div.innerHTML = `
      <p class="q-num">${label}</p>
      <p class="q-text">${q.text}</p>
      <div class="options-grid" id="opts-${q.id}">
        ${q.opts.map((o, i) => `<button class="opt-btn${saved === i ? ' selected' : ''}" onclick="pick('${q.id}',${i})">${o}</button>`).join('')}
      </div>
      ${q.ineligibleOpt !== undefined ? `<p class="ineligible-notice" id="notice-${q.id}">${tr.ineligibleNotice}</p>` : ''}
    `;
    sec.appendChild(div);
  });
  updateProgress();
}

function pick(qid, oi) {
  answers[qid] = oi;
  document.querySelectorAll(`#opts-${qid} .opt-btn`).forEach((b, i) => b.classList.toggle('selected', i === oi));
  document.getElementById('qb-' + qid).classList.add('answered');

  // ineligible notice for d1
  const notice = document.getElementById('notice-' + qid);
  if (notice) {
    const q = questions[lang].find(q => String(q.id) === String(qid));
    notice.style.display = (q && q.ineligibleOpt === oi) ? 'block' : 'none';
  }
  updateProgress();
}

function updateProgress() {
  const allIds = questions[lang].map(q => q.id);
  const n = allIds.filter(id => answers[id] !== undefined).length;
  const total = allIds.length;
  document.getElementById('progressFill').style.width = (n / total * 100) + '%';
  document.getElementById('progressLabel').textContent = t[lang].answered(n, total);
  document.getElementById('submitBtn').disabled = n < total;
}

async function submitQuiz() {
  const dims = {};
  dimOrder.forEach(d => dims[d] = calcDim(d));
  const profileKey = getProfileKey(dims);
  const adoption = Math.round((dims.PE + dims.EE + dims.HB + dims.HM) / 4);

  const schoolTier = questions[lang].find(q=>q.id==='d2').opts[answers['d2']] || '';
  const eduLevel   = questions[lang].find(q=>q.id==='d3').opts[answers['d3']] || '';
  const isBJ       = answers['d1'] === 0 ? 'yes' : 'no';

  await saveToAirtable({ dims, profileKey, adoption, isBJ, schoolTier, eduLevel });
  showResult(dims, profileKey);
}

function showResult(dims, profileKey) {
  const tr = t[lang];
  const p = profiles[lang][profileKey];

  document.getElementById('quizWrap').style.display = 'none';
  document.getElementById('resultWrap').style.display = 'block';

  document.getElementById('resEyebrow').textContent = tr.resEyebrow;
  document.getElementById('resTitle').textContent = p.title;
  document.getElementById('resTypeLabel').textContent = p.type;
  document.getElementById('resDesc').textContent = p.desc;
  document.getElementById('integrityText').textContent = p.integrity;
  document.getElementById('integrityLabel').textContent = p.integrityHigh ? tr.integrityLabelHigh : tr.integrityLabelLow;
  document.getElementById('refNote').textContent = tr.refNote;
  document.getElementById('retakeBtn').textContent = tr.retakeBtn;

  const ic = document.getElementById('integrityCallout');
  ic.className = 'integrity-callout' + (p.integrityHigh ? '' : ' low');

  const grid = document.getElementById('dimGrid');
  grid.innerHTML = '';
  dimOrder.forEach(d => {
    const score = dims[d];
    const card = document.createElement('div');
    card.className = 'dim-card';
    card.innerHTML = `
      <p class="dim-label">${tr.dimLabels[d]}</p>
      <div class="dim-bar-bg"><div class="dim-bar-fill" style="width:0%;background:${dimColors[d]}" data-w="${score}"></div></div>
      <p class="dim-score">${score}%</p>`;
    grid.appendChild(card);
  });
  setTimeout(() => document.querySelectorAll('.dim-bar-fill').forEach(b => b.style.width = b.dataset.w + '%'), 80);

  document.getElementById('recsWrap').innerHTML = `
    <p class="recs-section-title">${tr.shortTermLabel}</p>
    ${p.shortRecs.map(r=>`<div class="rec-item"><div class="rec-dot short"></div><p class="rec-text">${r}</p></div>`).join('')}
    <p class="recs-section-title">${tr.longTermLabel}</p>
    ${p.longRecs.map(r=>`<div class="rec-item"><div class="rec-dot long"></div><p class="rec-text">${r}</p></div>`).join('')}
  `;
}

async function saveToAirtable({ dims, profileKey, adoption, isBJ, schoolTier, eduLevel }) {
  const indicator = document.getElementById('savingIndicator');
  const tr = t[lang];
  if (AIRTABLE_TOKEN === 'YOUR_PERSONAL_ACCESS_TOKEN_HERE') return;
  indicator.textContent = tr.saving;
  indicator.className = 'saving-indicator';
  try {
    const res = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${AIRTABLE_TOKEN}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: {
        timestamp:    new Date().toISOString(),
        language:     lang,
        profile_type: profileKey,
        is_student:   isBJ,
        school_tier:  schoolTier,
        edu_level:    eduLevel,
        score_PE: dims.PE, score_EE: dims.EE, score_HB: dims.HB,
        score_HM: dims.HM, score_FC: dims.FC, score_IA: dims.IA,
        adoption_avg: adoption
      }})
    });
    if (!res.ok) throw new Error(await res.text());
    indicator.textContent = tr.saved;
    indicator.className = 'saving-indicator success';
  } catch(e) {
    console.error('Airtable error:', e);
    indicator.textContent = tr.saveErr;
    indicator.className = 'saving-indicator error';
  }
}

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.trim() === (l==='en'?'English':'中文')));
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  const tr = t[l];
  document.getElementById('hEyebrow').textContent  = tr.eyebrow;
  document.getElementById('hTitle').textContent    = tr.title;
  document.getElementById('hSubtitle').textContent = tr.subtitle;
  document.getElementById('submitBtn').textContent = tr.submitBtn;
  Object.keys(answers).forEach(k => delete answers[k]);
  renderQuestions();
}

function retake() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('resultWrap').style.display = 'none';
  document.getElementById('integrityCallout').classList.remove('low');
  document.getElementById('savingIndicator').textContent = '';
  document.getElementById('quizWrap').style.display = 'block';
  renderQuestions();
}

setLang('zh');
</script>
